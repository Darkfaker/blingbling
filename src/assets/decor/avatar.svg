<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD8A8"/>
      <stop offset="0.5" stop-color="#FFB5A7"/>
      <stop offset="1" stop-color="#C9A0DC"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3D2A5C"/>
      <stop offset="1" stop-color="#1F2347"/>
    </linearGradient>
    <linearGradient id="cloth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFCF7"/>
      <stop offset="1" stop-color="#FFE9D6"/>
    </linearGradient>
    <radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF8E9F" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#FF8E9F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- background sky circle -->
  <circle cx="100" cy="100" r="100" fill="url(#sky)"/>
  <!-- distant mountains -->
  <path d="M0 140 L30 120 L60 135 L100 110 L140 130 L170 115 L200 138 L200 200 L0 200 Z" fill="#9F7BD3" opacity="0.4"/>
  <path d="M0 155 L25 140 L55 152 L90 130 L130 148 L165 135 L200 152 L200 200 L0 200 Z" fill="#6B4FA8" opacity="0.35"/>
  <!-- hair back -->
  <path d="M50 110 Q40 70 70 50 Q100 35 130 50 Q160 70 150 110 L150 145 Q140 130 130 130 L70 130 Q60 130 50 145 Z" fill="url(#hair)"/>
  <!-- neck -->
  <rect x="88" y="130" width="24" height="20" fill="#FFE0CC"/>
  <!-- face -->
  <ellipse cx="100" cy="100" rx="38" ry="42" fill="#FFE9D6"/>
  <!-- hair front -->
  <path d="M62 90 Q60 65 100 60 Q140 65 138 90 Q138 75 120 70 Q110 80 100 78 Q90 80 80 70 Q62 75 62 90 Z" fill="url(#hair)"/>
  <!-- bangs sweep -->
  <path d="M68 78 Q80 72 100 75 Q120 72 132 78 Q130 85 120 82 Q110 90 100 88 Q90 90 80 82 Q70 85 68 78 Z" fill="#1F2347"/>
  <!-- eye right (viewer's left) -->
  <ellipse cx="85" cy="100" rx="3" ry="4" fill="#1F2347"/>
  <ellipse cx="115" cy="100" rx="3" ry="4" fill="#1F2347"/>
  <!-- eye highlights -->
  <circle cx="86" cy="99" r="1" fill="#FFFCF7"/>
  <circle cx="116" cy="99" r="1" fill="#FFFCF7"/>
  <!-- cheeks -->
  <circle cx="78" cy="112" r="6" fill="url(#cheek)"/>
  <circle cx="122" cy="112" r="6" fill="url(#cheek)"/>
  <!-- mouth -->
  <path d="M95 120 Q100 124 105 120" stroke="#D84565" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- collar -->
  <path d="M75 150 Q100 160 125 150 L130 180 Q100 175 70 180 Z" fill="url(#cloth)" stroke="#FF8E72" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- ribbon -->
  <path d="M85 155 L95 160 L95 170 L80 168 Z" fill="#FF7BA9" stroke="#B8334F" stroke-width="1"/>
  <path d="M115 155 L105 160 L105 170 L120 168 Z" fill="#FF7BA9" stroke="#B8334F" stroke-width="1"/>
  <circle cx="100" cy="162" r="3" fill="#E85D75"/>
  <!-- sakura in hair -->
  <g transform="translate(140 70)">
    <circle cx="0" cy="0" r="2" fill="#FFB5C8"/>
    <circle cx="3" cy="-1" r="2" fill="#FFB5C8"/>
    <circle cx="2" cy="3" r="2" fill="#FFB5C8"/>
    <circle cx="-2" cy="3" r="2" fill="#FFB5C8"/>
    <circle cx="-3" cy="-1" r="2" fill="#FFB5C8"/>
    <circle cx="0" cy="0" r="1" fill="#FFE0A8"/>
  </g>
</svg>
